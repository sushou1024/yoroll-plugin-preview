interface:
  display_name: "Yoroll"
  short_description: "Create with one card and natural-language setup"
  default_prompt: "Use $yoroll-plugin-basics to open and keep the Yoroll DEV workspace visible, show its single public intent card, collect current creation parameters in conversation, and keep the user-facing reply free of internal narration."

dependencies:
