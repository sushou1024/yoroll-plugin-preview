interface:
  display_name: "Yoroll"
  short_description: "Choose, create, and edit with Yoroll MCP"
  default_prompt: "Use $yoroll-plugin-basics to show Yoroll's public creation cards or continue a Yoroll project, requesting OAuth only when a protected MCP tool is called."

dependencies:
  tools:
    - type: "mcp"
      value: "yoroll"
      description: "Yoroll OAuth MCP server"
      transport: "streamable_http"
      url: "https://mcp.yoroll.ai/mcp"
